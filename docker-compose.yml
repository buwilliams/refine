# refine-web — Dockerized webapp.
#
# Run from the refine source directory, after `refine init <client-repo>`
# has bound this clone to a client (which writes the .env file this compose
# file reads):
#
#   cd /opt/refine
#   uv run refine init /srv/clients/acme-app
#   docker compose up
#
# REFINE_CLIENT_REFINE_DIR is set by `refine init` in the .env file alongside
# this compose file. It points at the client repo's `.refine/` directory.
# Inside the container, /refine-data is the volume root; refine.toml is
# discovered automatically because working_dir is /refine-data.
#
# The companion refine-runner runs natively on the host (so it inherits the
# host's Claude Code auth, SSH keys, and git config); it's not in this compose
# file by design. See README.

services:
  refine-web:
    build:
      context: .
    working_dir: /refine-data
    volumes:
      - "${REFINE_CLIENT_REFINE_DIR:?Run `refine init <client-repo>` first to bind this clone}:/refine-data"
      # Bind-mount the Python source + UI assets read-only so edits to
      # refine_web/, refine_shared/, or refine_web/static/ show up on next
      # container restart (Python) or next browser refresh (static) — no
      # `docker compose build` required for development.
      - "./refine_web:/app/refine_web:ro"
      - "./refine_shared:/app/refine_shared:ro"
    ports:
      - "8080:8080"
    restart: unless-stopped
