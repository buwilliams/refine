# refine-web — Dockerized webapp.
#
# Run from inside the client repo (the directory that contains `refine/`):
#
#   cd /srv/clients/acme-app
#   docker compose --file <path-to-refine>/docker-compose.yml up
#
# Or symlink this file into the client repo. The bind mounts below are
# relative to docker compose's own working directory.
#
# The companion refine-runner is NOT in this compose file by design — it runs
# natively on the host so it inherits the host's Claude Code auth, SSH keys,
# and git config. See README → "Running the host runner".

services:
  refine-web:
    build:
      context: .
    # Inside the container, /refine-data is the volume root; refine.toml is
    # discovered automatically because /refine-data is the working dir.
    working_dir: /refine-data
    volumes:
      # The client repo's `refine/` directory becomes the volume root.
      - ./refine:/refine-data
    ports:
      - "8080:8080"
    restart: unless-stopped
