<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>refine</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">refine</div>
    <nav class="nav">
      <a href="#/" data-route="dashboard">Dashboard</a>
      <a href="#/gaps" data-route="gaps">Gaps</a>
      <a href="#/logs" data-route="logs">Logs</a>
      <a href="#/changes" data-route="changes">Changes</a>
      <a href="#/agents" data-route="agents">Agents</a>
      <a href="#/settings" data-route="settings">Settings</a>
      <a href="#/tutorial" data-route="tutorial">Tutorial</a>
    </nav>
    <div class="topbar-actions">
      <a class="btn nav-action" href="#/gaps/new" id="btn-new-gap">+ New Gap</a>
      <a class="btn secondary nav-action" href="#/gaps/import" id="btn-import">Import…</a>
      <select id="global-reporter" aria-label="Reporter"></select>
      <a id="target-app-indicator" class="target-app-indicator"
         href="#/settings"
         aria-label="Target application status (click to manage)"
         title="Target application status"
         data-state="unknown">
        <span class="target-app-dot" aria-hidden="true"></span>
        <span class="target-app-label">App</span>
      </a>
    </div>
  </header>

  <div id="banners" class="banners"></div>

  <main id="main"></main>

  <aside id="chat-dock" class="chat-dock" aria-label="Chat dock"></aside>

  <template id="t-banner">
    <div class="banner">
      <span class="banner-msg"></span>
      <span class="banner-actions"></span>
    </div>
  </template>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
