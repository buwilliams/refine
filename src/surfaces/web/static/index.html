<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>refine</title>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/modals.css">
  <link rel="stylesheet" href="/static/css/gaps.css">
  <link rel="stylesheet" href="/static/css/guide.css">
  <link rel="stylesheet" href="/static/css/toolbar.css">
  <link rel="stylesheet" href="/static/vendor/xterm/xterm.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/" data-route="dashboard" aria-label="Refine dashboard">
      <img class="brand-logo" src="/static/images/refine_logo_transparent.png" alt="refine">
      <div class="brand-node" id="active-node-label">-</div>
    </a>
    <nav class="nav" data-testid="primary-nav">
      <a href="#/" data-route="dashboard" data-testid="nav-dashboard">Dashboard</a>
      <a href="#/features" data-route="features" data-testid="nav-features">Features</a>
      <a href="#/gaps" data-route="gaps" data-testid="nav-gaps">Gaps</a>
      <a href="#/changes" data-route="changes" data-testid="nav-changes">Changes</a>
      <a href="#/logs" data-route="logs" data-testid="nav-logs">Logs</a>
    </nav>
    <div class="topbar-actions">
      <details class="nav-menu nav-context-menu" id="nav-context-menu">
        <summary class="nav-context-summary" aria-label="Current context" data-testid="context-menu-toggle">
          <span class="target-app-dot nav-context-summary-dot" aria-hidden="true"></span>
          <span class="nav-context-app" id="nav-context-app-summary" data-testid="context-app-name">Application</span>
          <span class="nav-context-separator" aria-hidden="true">/</span>
          <span class="nav-context-reporter" id="nav-context-reporter-summary" data-testid="context-reporter-name">No reporter</span>
        </summary>
        <div class="nav-menu-panel nav-context-panel">
          <div class="nav-menu-label">Application</div>
          <a id="target-app-indicator" class="target-app-indicator nav-context-status"
             href="#/node/processes"
             aria-label="Target application status (click to manage)"
             title="Target application status"
             data-testid="context-target-app-status"
             data-state="unknown">
            <span class="target-app-dot" aria-hidden="true"></span>
            <span class="target-app-label">Application</span>
          </a>
          <label class="nav-menu-label nav-context-section-label" for="global-reporter">Reporter</label>
          <select id="global-reporter" aria-label="Reporter" data-testid="global-reporter"></select>
          <div class="nav-menu-label nav-context-section-label">Management</div>
          <a class="nav-menu-item nav-management-item" href="#/guide" id="nav-guide-open" data-route="guide" data-testid="nav-guide-open">
            <svg class="nav-menu-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 7v14"></path>
              <path d="M3 5a2 2 0 0 1 2-2h4a3 3 0 0 1 3 3v15a3 3 0 0 0-3-3H5a2 2 0 0 1-2-2V5Z"></path>
              <path d="M21 5a2 2 0 0 0-2-2h-4a3 3 0 0 0-3 3v15a3 3 0 0 1 3-3h4a2 2 0 0 0 2-2V5Z"></path>
            </svg>
            <span>Guide</span>
          </a>
          <a class="nav-menu-item nav-management-item" href="#/node/application" data-route="node">
            <svg class="nav-menu-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <path d="M8 8h8"></path>
              <path d="M8 12h8"></path>
              <path d="M8 16h5"></path>
            </svg>
            <span>Node</span>
          </a>
          <a class="nav-menu-item nav-management-item" href="#/project/governance" data-route="project">
            <svg class="nav-menu-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 3 5 6v5c0 4.4 2.8 8.4 7 10 4.2-1.6 7-5.6 7-10V6l-7-3Z"></path>
              <path d="m9 12 2 2 4-4"></path>
            </svg>
            <span>Governance</span>
          </a>
        </div>
      </details>
      <a id="agent-status-indicator" class="agent-status-indicator nav-status-indicator"
         href="#/node/processes"
         aria-label="Agent status (click to view processes)"
         title="Agent status"
         data-state="unknown">
        <span class="target-app-dot" aria-hidden="true"></span>
        <span class="agent-status-label">0</span>
      </a>
      <button class="secondary nav-command-button" id="btn-command-palette"
              data-testid="command-palette-button"
              aria-label="Open command palette">
        <span class="nav-command-icon" aria-hidden="true"></span>
        <span class="nav-command-shortcut" data-command-shortcut>Ctrl+K</span>
      </button>
      <button class="secondary nav-issue-button" id="btn-refine-issue"
              data-testid="nav-refine-issue"
              aria-label="Request refine feature or bugfix"
              title="Request refine feature or bugfix">
        <span class="nav-bug-icon" aria-hidden="true"></span>
      </button>
      <div class="nav-create-group">
        <a class="btn nav-action nav-create-primary" href="#/gaps/new" id="btn-new-gap" data-testid="nav-new-gap">+ New Gap</a>
        <details class="nav-menu nav-create-menu" id="nav-create-menu">
          <summary class="btn nav-action nav-create-more" aria-label="More create actions" data-testid="create-menu-toggle"></summary>
          <div class="nav-menu-panel nav-create-panel">
            <a class="nav-menu-item" href="#/features/new" id="btn-new-feature" data-testid="nav-new-feature">New Feature</a>
            <a class="nav-menu-item" href="#/gaps/plan" id="btn-plan" data-testid="nav-plan-mode">Plan Mode</a>
            <a class="nav-menu-item" href="#/gaps/import" id="btn-import" data-testid="nav-import-gaps">Import</a>
            <a class="nav-menu-item" href="https://github.com/buwilliams/refine/issues/new"
               id="btn-refine-issue-menu" data-testid="nav-refine-issue-menu">Request refine feature/bugfix</a>
          </div>
        </details>
      </div>
    </div>
  </header>

  <div id="banners" class="banners"></div>

  <main id="main"></main>

  <aside id="toolbar-dock" class="toolbar-dock" aria-label="Toolbar" data-testid="toolbar-dock"></aside>
  <aside id="guide-panel" class="guide-panel" aria-label="Guide" aria-hidden="true" data-testid="guide-panel"></aside>

  <template id="t-banner">
    <div class="banner" data-testid="global-banner">
      <span class="banner-msg" data-testid="global-banner-message"></span>
      <span class="banner-actions" data-testid="global-banner-actions"></span>
    </div>
  </template>

  <script src="/static/js/common.js"></script>
  <script src="/static/vendor/xterm/xterm.js"></script>
  <script src="/static/js/command-registry.js"></script>
  <script src="/static/js/workflow-visualization.js"></script>
  <script src="/static/js/features/dashboard.js"></script>
  <script src="/static/js/features/features.js"></script>
  <script src="/static/js/features/gaps-list.js"></script>
  <script src="/static/js/features/gaps-bulk.js"></script>
  <script src="/static/js/features/gaps-detail.js"></script>
  <script src="/static/js/features/gaps-new.js"></script>
  <script src="/static/js/features/gaps-import.js"></script>
  <script src="/static/js/features/gaps-import-modal.js"></script>
  <script src="/static/js/features/gaps-import-prepare.js"></script>
  <script src="/static/js/features/gaps-import-drafts.js"></script>
  <script src="/static/js/features/gaps-import-save.js"></script>
  <script src="/static/js/features/gaps-import-draft-state.js"></script>
  <script src="/static/js/features/gaps-import-draft-table.js"></script>
  <script src="/static/js/features/changes.js"></script>
  <script src="/static/js/features/toolbar.js"></script>
  <script src="/static/js/features/guide.js"></script>
  <script src="/static/js/features/logs.js"></script>
  <script src="/static/js/features/settings_application.js"></script>
  <script src="/static/js/features/settings_processes.js"></script>
  <script src="/static/js/features/settings_guidance.js"></script>
  <script src="/static/js/features/settings_quality.js"></script>
  <script src="/static/js/features/settings_runtime.js"></script>
  <script src="/static/js/features/settings_performance.js"></script>
  <script src="/static/js/features/settings_governance.js"></script>
  <script src="/static/js/features/settings_nodes.js"></script>
  <script src="/static/js/features/settings_reporters.js"></script>
  <script src="/static/js/features/settings.js"></script>
  <script src="/static/js/target-app.js"></script>
  <script src="/static/js/commands.js"></script>
  <script src="/static/js/command-palette.js"></script>
  <script src="/static/js/router.js"></script>
  <script src="/static/js/init.js"></script>
</body>
</html>
