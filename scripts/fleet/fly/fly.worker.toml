# Fleet worker config for Fly.io. The app name comes from
# `docs/runbooks/provision.md` (--app), and VM size/region are chosen by the
# operating agent with the user.
#
# Workers are private by default: fleet state converges through the shared
# Git remote, so no inbound HTTP is required. To reach a worker's web UI, use
# `fly proxy 8080 --app <app-name>`, or uncomment [http_service] to expose it
# publicly (Refine pushes authentication upstream, so only do this behind
# your own auth layer).

[env]
  REFINE_FLEET_WORKER = "1"

# [http_service]
#   internal_port = 8080
#   force_https = true
#   auto_stop_machines = "off"
#   auto_start_machines = true
#   min_machines_running = 1
