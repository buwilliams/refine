name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-deploy-refine-website
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy refine-website
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app refine-website
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
